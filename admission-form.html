<!DOCTYPE html>
<html>

<head>
    <title>Admission Form</title>
</head>

<body>
    <h2 align="center"><b>Admission Form for B.Tech</b></h2>
    <h3 align="center"><i>Vignan University</i></h3>

    <form>
        <div style="margin-left:35%;">

            <b>Fill your details here carefully</b>
            <br><br>

            Name:
            <input type="text">
            <br><br>

            Age:
            <input type="number">
            <br><br>

            Gender:
            <br><br>

            <input type="radio" name="Gender"> Male
            <input type="radio" name="Gender"> Female
            <input type="radio" name="Gender"> Other

            <br><br>

            Date of Birth:
            <input type="date">
            <br><br>

            Select Branch:
            <select>
                <option>CSE</option>
                <option>ACSE</option>
                <option>ECE</option>
                <option>EEE</option>
            </select>

            <br><br>

            Select your skills:
            <br><br>

            <input type="checkbox"> Programming
            <input type="checkbox"> Gaming
            <input type="checkbox"> Communication
            <input type="checkbox"> Games

            <br><br>

            E-mail:
            <input type="email">
            <br><br>

            Password:
            <input type="password">
            <br><br>

            <input type="submit" value="Submit">

        </div>
    </form>

</body>

</html>
